<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthX - {% block title %}{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        nav {
            background: #1e293b;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            border-bottom: 1px solid #334155;
        }
        nav .brand {
            font-size: 20px;
            font-weight: 700;
            color: #38bdf8;
            text-decoration: none;
            margin-right: auto;
        }
        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        nav a:hover { color: #e2e8f0; }
        .page-wrap {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 16px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }
        .card-wide { max-width: 860px; }
        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: #38bdf8; }
        textarea { resize: vertical; min-height: 80px; }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 11px;
            background: #0ea5e9;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
        }
        button { width: 100%; padding: 11px; background: #0ea5e9; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover, .btn:hover { background: #0284c7; }
        .alert {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .alert-error { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
        .alert-success { background: #052e16; border: 1px solid #14532d; color: #86efac; }
        .links { text-align: center; margin-top: 18px; font-size: 13px; color: #64748b; }
        .links a { color: #38bdf8; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 12px; background: #0f172a; color: #64748b; font-weight: 600; border-bottom: 1px solid #334155; }
        td { padding: 10px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
        tr:hover td { background: #1e293b; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-low  { background:#134e4a; color:#5eead4; }
        .badge-med  { background:#431407; color:#fdba74; }
        .badge-high { background:#450a0a; color:#fca5a5; }
        .badge-open { background:#1e3a5f; color:#93c5fd; }
        .badge-resolved { background:#052e16; color:#86efac; }
        .badge-in_progress { background:#2d1657; color:#c4b5fd; }
        .search-bar { display:flex; gap:10px; margin-bottom:20px; }
        .search-bar input { flex:1; }
        .search-bar button { width:auto; padding: 10px 20px; }
    </style>
</head>
<body>
{% block nav %}{% endblock %}
<div class="page-wrap">
    {% block content %}{% endblock %}
</div>
</body>
</html>
